<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoGebra 工具</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
    }
    #ggb-element {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="ggb-element"></div>

  <!-- GeoGebra JavaScript API（本地部署，不从 CDN 加载） -->
  <script src="GeoGebra/deployggb.js"></script>
  <script>
    // GeoGebra Applet 实例
    var ggbApp = null;
    var LOG_PREFIX = '[GeoGebra-Backend]';

    // 日志函数
    function log() {
      var args = Array.prototype.slice.call(arguments);
      args.unshift(LOG_PREFIX);
      console.log.apply(console, args);
    }

    function logError() {
      var args = Array.prototype.slice.call(arguments);
      args.unshift(LOG_PREFIX + ' [ERROR]');
      console.error.apply(console, args);
    }

    function logWarn() {
      var args = Array.prototype.slice.call(arguments);
      args.unshift(LOG_PREFIX + ' [WARN]');
      console.warn.apply(console, args);
    }

    // 解析 URL 参数中的表达式
    function getExpressionFromUrl() {
      log('解析 URL 参数...');
      var params = new URLSearchParams(window.location.search);
      var expr = params.get('expr') || '';
      log('URL 参数：', window.location.search);
      log('从 URL 提取的表达式：', expr);
      return expr;
    }

    // 初始化 GeoGebra Applet
    function initGeogebra() {
      log('初始化 GeoGebra Applet...');
      log('窗口尺寸：', window.innerWidth, 'x', window.innerHeight);
      
      var params = {
        "appName": "graphing",
        "width": window.innerWidth,
        "height": window.innerHeight,
        "showToolBar": true,
        "showAlgebraInput": true,
        "showMenuBar": false,
        "allowStyleBar": true,
        "showResetIcon": true,
        "enableLabelDrags": true,
        "enableShiftDragZoom": true,
        "enableRightClick": true,
        "showToolBarHelp": false,
        "errorDialogsActive": false,
        "useBrowserForJS": false,
        "allowUpscale": true,
        "autoHeight": false,
        "playButton": false,
        "canFullscreen": true,
        "appletOnLoad": function(api) {
          ggbApp = api;
          log('Applet 加载成功');
          log('Applet 可用 API 方法：', Object.keys(api).filter(function(k) { return typeof api[k] === 'function'; }).join(', '));

          // 通知父窗口 GeoGebra 已就绪
          if (window.parent && window.parent !== window) {
            log('通知父窗口：ggbReady');
            window.parent.postMessage({ type: 'ggbReady' }, '*');
          }

          // 检查 URL 参数中是否有待绘制表达式
          var expr = getExpressionFromUrl();
          if (expr) {
            log('在 URL 中发现表达式，正在绘制：', expr);
            plotFunction(expr);
          } else {
            log('URL 中未发现表达式');
          }
        }
      };

      log('创建 GGBApplet，参数：', JSON.stringify(params, null, 2));
      var ggbApp1 = new GGBApplet(params, true);

      // ⭐ 关键：设置本地代码库路径，启用离线模式
      log('设置 HTML5Codebase：GeoGebra/HTML5/5.0/web3d/');
      ggbApp1.setHTML5Codebase("GeoGebra/HTML5/5.0/web3d/", true);

      log('注入 applet 到 #ggb-element...');
      ggbApp1.inject('ggb-element');
      log('Applet 注入已发起');
    }

    /**
     * 绘制函数
     * 每次新函数先清空画布（D15 决策）
     */
    function plotFunction(expression) {
      log('plotFunction 调用，表达式：', expression);
      
      if (!ggbApp) {
        logWarn('Applet 未就绪，500ms 后重试...');
        setTimeout(function() { plotFunction(expression); }, 500);
        return;
      }

      // D15: 每次新函数先清空画布
      // ⚠️ GeoGebra JS API 没有 removeAll()，使用 reset() 代替
      log('清空画布（reset）...');
      try {
        ggbApp.reset();
      } catch(e) {
        logWarn('reset() 失败，尝试 evalCommand：' + e);
        try { ggbApp.evalCommand('Delete(AllObjects)'); } catch(e2) { logWarn('Delete(AllObjects) 也失败了：' + e2); }
      }
      log('画布已清空，正在绘制：', expression);

      // 先尝试 f(x) = expr 格式
      var command = expression;
      if (expression.indexOf('=') === -1 && expression.indexOf('(') === -1) {
        // 简单表达式如 "2/x"，补上 f(x)=
        command = 'f(x) = ' + expression;
        log('表达式不含 "=" 或 "("，前置添加 "f(x) = "：', command);
      } else {
        log('表达式已含 "=" 或 "("，直接使用：', command);
      }

      log('执行 evalCommand：', command);
      var success = ggbApp.evalCommand(command);
      log('evalCommand 结果：', success);

      if (!success) {
        logWarn('首次尝试失败，使用 "f(x) = " 前缀兜底');
        var fallbackCommand = 'f(x) = ' + expression;
        log('执行兜底 evalCommand：', fallbackCommand);
        var success2 = ggbApp.evalCommand(fallbackCommand);
        log('兜底 evalCommand 结果：', success2);
        
        if (!success2) {
          logError('两次尝试均失败，无法绘制表达式：', expression);
        }
      } else {
        log('函数绘制成功');
      }
    }

    // 监听 postMessage（H5 端通信，用于已加载后更新函数）
    window.addEventListener('message', function(event) {
      log('收到 postMessage：', event.data);
      var data = event.data;
      if (data && data.type === 'plotFunction' && data.expression) {
        log('postMessage 类型为 plotFunction，表达式：', data.expression);
        plotFunction(data.expression);
      } else {
        log('postMessage 已忽略，类型：', data ? data.type : 'undefined');
      }
    });

    // 暴露全局接口（小程序 evalJS 调用）
    window.plotFunction = plotFunction;
    log('全局 plotFunction 已暴露到 window.plotFunction');

    // 页面加载完成后初始化
    log('设置 DOMContentLoaded 监听器...');
    window.addEventListener('DOMContentLoaded', function() {
      log('DOMContentLoaded 触发，调用 initGeogebra...');
      initGeogebra();
    });
    
    // 备用初始化
    if (document.readyState === 'complete' || document.readyState === 'interactive') {
      log('文档已就绪（readyState：', document.readyState, '），直接调用 initGeogebra...');
      initGeogebra();
    } else {
      log('文档尚未就绪（readyState：', document.readyState, '），等待 DOMContentLoaded...');
    }
  </script>
</body>
</html>
